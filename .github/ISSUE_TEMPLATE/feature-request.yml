name: "기능 요청"
description: 새로운 기능을 요청합니다.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제나 불편함을 해결하고 싶은지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 어떤 방식으로 해결하면 좋을지 제안해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 검토
      description: 다른 방법을 검토했다면 설명해주세요.
    validations:
      required: false