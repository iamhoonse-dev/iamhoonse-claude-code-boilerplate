name: "문서 개선"
description: 문서의 개선 사항을 제안합니다.
labels: ["documentation"]
body:
  - type: input
    id: target-doc
    attributes:
      label: 대상 문서
      description: 개선이 필요한 문서를 지정해주세요. (예: README.md, CONTRIBUTING.md)
      placeholder: README.md
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 현재 문제점
      description: 현재 문서에서 부족하거나 잘못된 부분을 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 개선 제안
      description: 어떻게 개선하면 좋을지 제안해주세요.
    validations:
      required: true