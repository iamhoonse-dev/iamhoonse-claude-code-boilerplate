name: "버그 리포트"
description: 버그를 보고합니다.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그인지 간략히 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 버그를 재현할 수 있는 단계를 작성해주세요.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했을 때 어떤 결과를 기대하는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떤 결과가 나타나는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 환경 정보
      description: OS, 관련 도구 버전 등 환경 정보를 작성해주세요.
    validations:
      required: false
